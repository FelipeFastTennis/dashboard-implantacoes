<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Implantações · Sults Live</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F4F0;--sur:#fff;--brd:rgba(0,0,0,.07);--brdm:rgba(0,0,0,.12);
  --txt:#18171A;--t2:#6B6A66;--t3:#A09F9A;--r:10px;--rsm:5px;
  --sh:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.04);
  --teal:#009688;--tlt:#E0F2F1;
  --red:#DC2626;--rbg:#FEF2F2;--rt:#991B1B;
  --ora:#EA580C;--obg:#FFF7ED;--ot:#9A3412;
  --amb:#D97706;--abg:#FFFBEB;--at:#92400E;
  --grn:#16A34A;--gbg:#F0FDF4;--gt:#14532D;
  --blu:#2563EB;--bbg:#EFF6FF;--bt:#1D4ED8;
  --pur:#7C3AED;--pbg:#F5F3FF;--pt:#4C1D95;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.5}
header{background:var(--sur);border-bottom:1px solid var(--brdm);padding:11px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--sh)}
.logo{display:flex;align-items:center;gap:9px}
.logo-badge{background:var(--txt);color:#fff;font-size:10px;font-weight:700;padding:3px 7px;border-radius:4px;letter-spacing:.06em}
.logo-title{font-size:14px;font-weight:600}
.hdr-r{display:flex;align-items:center;gap:10px}
.meta-pill{background:var(--rbg);color:var(--rt);font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;border:1px solid rgba(220,38,38,.2)}
.live-pill{background:var(--gbg);color:var(--gt);font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;border:1px solid rgba(22,163,74,.25);display:flex;align-items:center;gap:5px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--grn);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn-refresh{padding:5px 12px;font-size:12px;font-weight:500;border-radius:var(--rsm);border:1px solid var(--brdm);background:var(--sur);color:var(--t2);cursor:pointer;font-family:inherit;transition:all .13s}
.btn-refresh:hover{background:var(--bg)}
.btn-refresh:disabled{opacity:.5;cursor:not-allowed}
.upd{font-size:11px;color:var(--t3);font-family:'DM Mono',monospace}
main{max-width:1380px;margin:0 auto;padding:22px 24px}
.sec{margin-bottom:26px}
.sec-lbl{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:11px;display:flex;align-items:center;gap:7px}
.sec-lbl small{color:var(--t3);font-weight:400;font-size:10px;text-transform:none;letter-spacing:0}

/* Loading */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--tlt);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--t2)}
.progress-bar-wrap{width:260px;height:4px;background:var(--bg);border-radius:2px;overflow:hidden}
.progress-bar-fill{height:4px;background:var(--teal);border-radius:2px;transition:width .3s}
.error-wrap{background:var(--rbg);border:1px solid rgba(220,38,38,.2);border-radius:var(--r);padding:20px 24px;text-align:center}
.error-wrap h3{color:var(--red);font-size:15px;margin-bottom:8px}
.error-wrap p{color:var(--t2);font-size:13px;line-height:1.6}

/* KPI */
.kpi-row{display:grid;grid-template-columns:1.6fr repeat(5,1fr);gap:9px}
.kpi{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh)}
.kpi.hero{background:var(--txt);color:#fff}
.kpi-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;opacity:.55;margin-bottom:4px}
.kpi-value{font-size:26px;font-weight:600;line-height:1;letter-spacing:-.5px}
.kpi-sub{font-size:10px;margin-top:4px;opacity:.5}
.kpi.hero .kpi-label,.kpi.hero .kpi-sub{color:#fff}

/* Funnel */
.funnel{display:grid;grid-template-columns:repeat(5,1fr);border:1px solid var(--brdm);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.ph-col{background:var(--sur);padding:14px 13px;border-right:1px solid var(--brd)}
.ph-col:last-child{border-right:none}
.ph-name{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:5px;margin-bottom:2px}
.ph-range{font-size:9px;color:var(--t3);margin-bottom:4px}
.ph-tasks{font-size:9px;color:var(--t2);font-style:italic;margin-bottom:10px;line-height:1.4}
.ph-count{font-size:28px;font-weight:700;line-height:1;margin-bottom:8px}
.ph-sub{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap}
.ph-items{display:flex;flex-direction:column;gap:2px}
.ph-item{font-size:10px;padding:3px 6px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:default}
.ph-more{font-size:10px;color:var(--t3);padding:2px 6px;font-style:italic}
.ph-loading{font-size:10px;color:var(--t3);font-style:italic;padding:4px 0}

/* Badge */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.b-red{background:var(--rbg);color:var(--rt)}
.b-ora{background:var(--obg);color:var(--ot)}
.b-amb{background:var(--abg);color:var(--at)}
.b-grn{background:var(--gbg);color:var(--gt)}
.b-blu{background:var(--bbg);color:var(--bt)}
.b-pur{background:var(--pbg);color:var(--pt)}
.b-pau{background:#F1EFE8;color:#444441}

/* Tab */
.tab-bar{display:flex;gap:4px;margin-bottom:11px;flex-wrap:wrap;align-items:center}
.tab{padding:5px 12px;font-size:11px;font-weight:500;border-radius:var(--rsm);border:1px solid var(--brdm);background:var(--sur);color:var(--t2);cursor:pointer;font-family:inherit;transition:all .13s}
.tab:hover{background:var(--bg)}
.tab.active{background:var(--txt);color:#fff;border-color:var(--txt)}
.tab-count{font-size:10px;background:var(--bg);color:var(--t2);padding:0 5px;border-radius:9px;margin-left:3px}
.tab.active .tab-count{background:rgba(255,255,255,.2);color:#fff}

/* Table */
.tbl-card{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--bg);padding:8px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--brdm);white-space:nowrap}
tbody td{padding:8px 12px;border-bottom:1px solid var(--brd);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#FAFAF8}
.td-name{font-weight:500}
.td-m{color:var(--t2)}
.td-mono{font-family:'DM Mono',monospace;font-size:11px}

/* Progress */
.prog-wrap{display:flex;align-items:center;gap:7px}
.prog-track{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;min-width:60px}
.prog-fill{height:6px;border-radius:3px;transition:width .4s}
.prog-lbl{font-family:'DM Mono',monospace;font-size:10px;font-weight:600;min-width:34px;text-align:right}

/* Analyst */
.a-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:9px}
.a-card{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);padding:13px 14px;box-shadow:var(--sh)}
.a-hd{display:flex;align-items:center;gap:9px;margin-bottom:11px}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.a-name{font-size:12px;font-weight:600}
.a-sub{font-size:10px;color:var(--t3)}
.a-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:9px;text-align:center}
.sv{font-size:15px;font-weight:700}
.sl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.03em}
.a-bar-wrap{height:4px;background:var(--bg);border-radius:2px;overflow:hidden;margin-bottom:3px}
.a-bar{height:4px;border-radius:2px;transition:width .4s}
.a-bar-lbl{display:flex;justify-content:space-between;font-size:9px;color:var(--t3)}

/* Phase mini bar */
.phase-progress{margin-top:8px;display:flex;flex-direction:column;gap:3px}
.pp-row{display:flex;align-items:center;gap:5px;font-size:9px}
.pp-label{color:var(--t3);width:60px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pp-track{flex:1;height:3px;background:var(--bg);border-radius:2px;overflow:hidden}
.pp-fill{height:3px;border-radius:2px}
.pp-pct{color:var(--t2);min-width:24px;text-align:right;font-family:'DM Mono',monospace}


/* Expandable funnel */
.ph-col{cursor:pointer;transition:box-shadow .15s}
.ph-col:hover{box-shadow:inset 0 0 0 2px var(--teal)}
.ph-col.active{box-shadow:inset 0 0 0 2px var(--teal);background:#FAFFFE}
.ph-expand{display:none;grid-column:1/-1;background:var(--sur);border-top:2px solid var(--teal);padding:0}
.ph-expand.open{display:block}
.ph-expand-inner{padding:14px 16px}
.ph-expand-title{font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.ph-expand-close{cursor:pointer;font-size:16px;color:var(--t3);font-weight:400;line-height:1}
.ph-expand-close:hover{color:var(--txt)}
.exp-table{width:100%;border-collapse:collapse;font-size:12px}
.exp-table thead th{background:var(--bg);padding:7px 10px;text-align:left;font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--brdm);white-space:nowrap}
.exp-table tbody td{padding:7px 10px;border-bottom:1px solid var(--brd);vertical-align:middle}
.exp-table tbody tr:last-child td{border-bottom:none}
.exp-table tbody tr:hover td{background:#FAFFF8}
.desvio-pos{color:var(--red);font-weight:600;font-family:'DM Mono',monospace;font-size:11px}
.desvio-neg{color:var(--grn);font-weight:600;font-family:'DM Mono',monospace;font-size:11px}
.desvio-ok{color:var(--t2);font-family:'DM Mono',monospace;font-size:11px}


/* ── TIMELINE ───────────────────────────────────────────────────────────────── */
.timeline-wrap{overflow-x:auto;padding-bottom:4px}
.timeline-grid{display:grid;grid-template-columns:repeat(8,minmax(140px,1fr));gap:0;border:1px solid var(--brdm);border-radius:var(--r);overflow:hidden;min-width:900px}
.tl-month{background:var(--sur);border-right:1px solid var(--brd)}
.tl-month:last-child{border-right:none}
.tl-month-hd{padding:10px 12px 8px;border-bottom:1px solid var(--brdm);display:flex;flex-direction:column;gap:2px}
.tl-month-name{font-size:12px;font-weight:700;color:var(--txt)}
.tl-month-count{font-size:10px;color:var(--t3)}
.tl-month.current .tl-month-hd{background:var(--tlt)}
.tl-month.current .tl-month-name{color:var(--teal)}
.tl-month-body{padding:8px;display:flex;flex-direction:column;gap:4px;min-height:80px}
.tl-unit{font-size:10px;padding:4px 7px;border-radius:4px;line-height:1.3;cursor:default;transition:opacity .15s}
.tl-unit:hover{opacity:.8}
.tl-unit-name{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-unit-resp{font-size:9px;opacity:.7;margin-top:1px}
.tl-month-past .tl-month-hd{background:var(--bg)}
.tl-month-past .tl-month-name{color:var(--t3)}
.tl-empty{font-size:10px;color:var(--t3);font-style:italic;padding:4px 2px}

footer{text-align:center;padding:22px 0 30px;font-size:11px;color:var(--t3);font-family:'DM Mono',monospace}

@media(max-width:1100px){.kpi-row{grid-template-columns:1fr 1fr 1fr}.funnel{grid-template-columns:1fr 1fr}}
@media(max-width:700px){.kpi-row{grid-template-columns:1fr 1fr};main{padding:14px}}
</style>
</head>

// Mapeamento fase Sults → fase usuário
function mapPhase(codigo) {
  if(!codigo) return null;
  const n = parseInt(codigo.replace(/\D/g,''));
  if(n<=2)  return null; // F01–F02: pré-implantação (irrelevante)
  if(n===3) return 1;    // F03: Busca de Ponto
  if(n===4) return 2;    // F04: Ponto — Negociação e Contratos
  if(n===5) return null; // F05: Documentação — IGNORADA (corre em paralelo)
  if(n===6) return 3;    // F06: Planejamento e Projetos
  if(n<=9)  return 4;    // F07–F09: Execução de Obra
  return 5;              // F10–F17: Reta Final
}

function days(a) {
  return Math.round((TODAY - new Date(a)) / 864e5);
}
function mStr(d){ return (d/30.4).toFixed(1)+'m' }
function fn(n){ return n ? n.split(' ')[0] : '—' }
function ini(n){ if(!n)return'?'; const p=n.split(' '); return(p[0][0]+(p[1]?p[1][0]:'')).toUpperCase() }
function fmt(d){ if(!d)return'—'; const dt=new Date(d); return FMT.format(dt) }
function barColor(pct){ return pct>100?'#DC2626':pct>82?'#EA580C':pct>60?'#D97706':'#16A34A' }
function metaSt(dtI, phaseUID, durTotal){
  const d = days(dtI);
  // Tempo de referência para a meta: usa o tempo TOTAL previsto se disponível,
  // senão o tempo já decorrido
  const dRef = (durTotal != null && durTotal > 0) ? durTotal : d;

  // 1. Tempo total previsto estoura a meta de 8 meses
  if(dRef > META) return { l:'Estourou — '+mStr(dRef)+' previstos', cls:'b-red' };

  // 2. Ponto não definido após 40 dias (usa tempo decorrido real)
  if(phaseUID === 1 && d > 40)
    return { l:'Em risco — ponto não definido ('+d+'d)', cls:'b-ora' };

  // 3. Acima de 5 meses decorridos e ainda não está em Obra ou Reta Final
  if(phaseUID !== null && phaseUID < 4 && d > 150)
    return { l:'Em risco — '+mStr(d)+' sem iniciar obra', cls:'b-ora' };

  return { l:'No prazo — '+mStr(dRef), cls:'b-grn' };
}

async function apiFetch(url, tentativa=0) {
  // url vem como "/implantacao/projeto?start=0&limit=30"
  // Precisamos separar o path da query e montar: /api/sults?path=PATH&start=0&limit=30
  const [path, qs] = url.split('?');
  const proxyUrl = `${BASE}${encodeURIComponent(path)}${qs ? '&' + qs : ''}`;

  const r = await fetch(proxyUrl, {
    headers: { 'Content-Type': 'application/json;charset=UTF-8' }
  });
  // 429 = rate limit → espera progressiva e tenta de novo (até 4x)
  if(r.status === 429 && tentativa < 6) {
    const espera = 1000 * Math.pow(2, tentativa);
    await new Promise(res => setTimeout(res, espera));
    return apiFetch(url, tentativa + 1);
  }
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function fetchAllProjects() {
  let all=[], page=0;
  while(true){
    let d;
    try {
      d = await apiFetch(`/implantacao/projeto?start=${page}&limit=30`);
    } catch(e) {
      d = await apiFetch(`/implantacao/projeto?start=${page}&limit=10`);
    }
    all = all.concat(d.data||[]);
    if(page+1 >= (d.totalPage||1) || (d.data||[]).length===0) break;
    page++;
  }
  return all;
}

// Descobre o maior limit aceito pela API testando valores decrescentes
async function descobrirLimite(projId) {
  const candidatos = [50, 30, 20, 10, 5];
  for(const lim of candidatos) {
    try {
      const d = await apiFetch(`/implantacao/projeto/${projId}/tarefa?start=0&limit=${lim}`);
      if(d && d.data) {
        console.log(`[SULTS] Limite descoberto: ${lim}`);
        return lim;
      }
    } catch(e) {
      // Esse limite falhou (400), tenta o próximo menor
      console.warn(`[SULTS] limit=${lim} rejeitado, tentando menor…`);
    }
  }
  return 5; // fallback mínimo seguro
}

async function apiFetchRetry(url, max=6){
  for(let t=0;t<max;t++){
    try { return await apiFetch(url); }
    catch(e){ if(t===max-1) throw e; await new Promise(r=>setTimeout(r,800*(t+1))); }
  }
}

// Busca TODAS as tarefas com verificacao de completude.
// A API usa "start", mas nao esta documentado se e numero de pagina (0,1,2...)
// ou indice de registro (0,50,100...). O codigo testa os dois modos, deduplica
// por id e so aceita o resultado quando o total baixado bate com o "size"
// informado pela API. Se nao bater, lanca erro e o projeto e reprocessado —
// nunca e classificado com dados parciais.
async function fetchAllTasks(projId) {
  if(TASK_LIMIT === 0) TASK_LIMIT = await descobrirLimite(projId);

  let melhor = [], size = null;

  for(const modo of ['pagina','offset']) {
    const vistos = new Set();
    let all = [], i = 0, guarda = 0;

    while(guarda++ < 400) {
      const start = (modo === 'pagina') ? i : i * TASK_LIMIT;
      const d = await apiFetchRetry(`/implantacao/projeto/${projId}/tarefa?start=${start}&limit=${TASK_LIMIT}`);
      const lote = d.data || [];
      if(d.size != null) size = d.size;

      let novos = 0;
      for(const t of lote){
        const k = t.id ?? (t.codigo + '|' + t.nome);
        if(!vistos.has(k)){ vistos.add(k); all.push(t); novos++; }
      }

      if(lote.length === 0) break;
      if(novos === 0) break;                       // so repetidos -> modo errado
      if(size != null && all.length >= size) break; // completo
      i++;
      await new Promise(r=>setTimeout(r,120));
    }

    if(all.length > melhor.length) melhor = all;
    if(size != null && melhor.length >= size) break; // completo, nao testa o outro modo
  }

  if(size != null && melhor.length < size)
    throw new Error(`Incompleto: ${melhor.length}/${size} tarefas`);

  return melhor;
}


// Determina a fase atual do projeto a partir das tarefas reais.
// REGRA: a fase atual e a MAIS AVANCADA (maior numero) que ja tenha pelo menos
// uma tarefa concluida (situacao=1) ou em andamento (situacao=3). Tarefas apenas
// abertas(2), aguardando(4) ou a definir(5) numa fase anterior NAO seguram o
// projeto nela. F05 (Documentacao) e ignorada por correr em paralelo.
function getCurrentPhase(tasks) {
  if(!tasks || tasks.length === 0) return null;

  // Tarefas que dependem de terceiros e ficam abertas travando o projeto
  const IGNORAR_NOME = ['solicitar a ligacao rede', 'solicitar a ligação rede'];

  const phases = {};

  tasks.forEach(t => {
    const nomeLower = (t.nome || '').toLowerCase();
    if(IGNORAR_NOME.some(termo => nomeLower.includes(termo))) return;

    // 1) fase.codigo direto ("F07")
    let cod = t.fase?.codigo;
    // 2) parse do codigo da tarefa ("F07-T134" -> "F07")
    if(!cod && t.codigo) {
      const m = String(t.codigo).match(/^(F\d+)/i);
      if(m) cod = m[1].toUpperCase();
    }
    // 3) mapeamento pelo nome da fase
    if(!cod && t.fase?.nome) {
      const f = String(t.fase.nome).toLowerCase();
      if(f.includes('contrat'))      cod = 'F01';
      else if(f.includes('day'))     cod = 'F02';
      else if(f.includes('mercado')) cod = 'F03';
      else if(f.includes('ponto'))   cod = 'F04';
      else if(f.includes('doc'))     cod = 'F05';
      else if(f.includes('plane'))   cod = 'F06';
      else if(f.includes('civil'))   cod = 'F07';
      else if(f.includes('quadra'))  cod = 'F08';
      else if(f.includes('mobil'))   cod = 'F10';
      else if(f.includes('selet'))   cod = 'F11';
      else if(f.includes('market'))  cod = 'F14';
      else if(f.includes('inaug'))   cod = 'F17';
    }
    if(!cod) return;

    const n = parseInt(cod.replace(/\D/g,''));
    if(n === 5) return; // F05 ignorada

    // O campo "situacao" e a fonte confiavel.
    // 1=Concluido 2=Aberto 3=Em Andamento 4=Aguardando 5=Definir
    const sit = Number(t.situacao);
    const isDone     = sit === 1;
    const isIniciada = sit === 1 || sit === 3;

    if(!phases[cod]) phases[cod] = {total:0, done:0, iniciadas:0, cod, n};
    phases[cod].total++;
    if(isDone) phases[cod].done++;
    if(isIniciada) phases[cod].iniciadas++;
  });

  const sorted = Object.values(phases).sort((a,b) => a.n - b.n);
  if(!sorted.length) return null;

  const iniciadas = sorted.filter(ph => ph.iniciadas > 0);
  if(iniciadas.length === 0) return sorted[0].cod;

  return iniciadas[iniciadas.length - 1].cod;
}

function calcProgress(tasks) {
  const byUserPhase = {};
  USER_PHASES.forEach(p => { byUserPhase[p.id]={total:0,done:0} });

  tasks.forEach(t => {
    const cod = t.fase?.codigo;
    const uid = mapPhase(cod);
    if(!uid) return;
    byUserPhase[uid].total++;
    if(Number(t.situacao)===SIT_DONE) byUserPhase[uid].done++;
  });

  const totalAll = tasks.length;
  const doneAll  = tasks.filter(t=>Number(t.situacao)===SIT_DONE).length;
  const pct      = totalAll ? Math.round(doneAll/totalAll*100) : 0;

  return {byUserPhase, totalAll, doneAll, pct};
}

let PROJS_ENRICHED = [];
let TASKS_LOADED   = {};

// ── CACHE LOCAL (localStorage) ───────────────────────────────────────────────
const CACHE_KEY  = 'sults_tasks_v2';
const CACHE_TTL  = 12 * 60 * 60 * 1000; // 12 horas em ms (alinhado ao proxy)

function cacheLoad() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if(!raw) return null;
    const { resumo, timestamp } = JSON.parse(raw);
    const age = Date.now() - timestamp;
    if(age > CACHE_TTL) return null;
    const entries = Object.values(resumo || {});
    if(entries.length === 0) {
      localStorage.removeItem(CACHE_KEY);
      return null;
    }
    return { resumo, age: Math.round(age/60000) };
  } catch(e) { return null; }
}

function cacheSave(projsEnriched) {
  try {
    // Guarda APENAS o resumo leve por projeto (não as tarefas completas,
    // que estourariam o limite de 5MB do localStorage). Os dados brutos já
    // ficam no cache de 12h do proxy no servidor.
    const resumo = {};
    projsEnriched.forEach(p => {
      if(p.tasksLoaded && p.currentPhaseUID) {
        resumo[p.id] = {
          fase: p.currentPhaseUID,
          cod:  p.currentPhaseCod,
          pct:  p.progPct,
          done: p.progData?.doneAll || 0,
          tot:  p.progData?.totalAll || 0
        };
      }
    });
    localStorage.setItem(CACHE_KEY, JSON.stringify({
      resumo: resumo,
      timestamp: Date.now()
    }));
  } catch(e) { console.warn('Cache não salvo:', e); }
}

function cacheInvalidate() {
  try { localStorage.removeItem(CACHE_KEY); } catch(e) {}
}

function setProgress(pct, text) {
  const bar  = document.getElementById('prog-bar');
  const ltxt = document.getElementById('loading-text');
  if(bar)  bar.style.width = pct+'%';
  if(ltxt && text) ltxt.textContent = text;
}

async function init() {
  const btn = document.getElementById('btn-refresh');

  const main = document.getElementById('main');
  main.innerHTML = `<div class="loading-wrap" id="loading">

    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-bar" style="width:5%"></div></div>
  </div>`;

  try {
    // 1. Verificar cache antes de qualquer chamada
    const cached = cacheLoad();

    // 2. Buscar projetos
    setProgress(10, 'Buscando todos os projetos…');
    const rawProjs = await fetchAllProjects();
    setProgress(30, `${rawProjs.length} projetos encontrados. Processando…`);

    // Enriquecer projetos
    PROJS_ENRICHED = rawProjs.map(p => ({
      id:       p.id,
      nome:     p.nome,
      ativo:    p.ativo,
      pausado:  p.pausado,
      concluido:p.concluido,
      resp:     p.responsavel?.nome || '—',
      unidade:  p.unidade?.nomeFantasia || '—',
      dtI:      p.dtInicio?.slice(0,10),
      dtF:      p.dtFim?.slice(0,10) || p.dtFimPlanejamento?.slice(0,10), // Data de Término Projetada
      dtC:      p.dtConclusao?.slice(0,10),
      unidade:  p.unidade?.nomeFantasia || '—',
      modelo:   p.modelo?.nome || '—',
      status:   p.concluido?'concluido':p.pausado?'pausado':p.ativo?'em_andamento':'inativo',
      dur:      p.dtInicio ? days(p.dtInicio.slice(0,10)) : 0,
      durTotal: (p.dtInicio && (p.dtFim||p.dtFimPlanejamento))
                  ? Math.round((new Date((p.dtFim||p.dtFimPlanejamento).slice(0,10)) - new Date(p.dtInicio.slice(0,10)))/864e5)
                  : null,
      meta:     p.dtInicio ? metaSt(p.dtInicio.slice(0,10), null, null) : {l:'—',cls:'b-pau'},
      // Tasks loaded later
      tasksLoaded: false,
      currentPhaseCod: null,
      currentPhaseUID: null,
      progPct: null,
      progData: null,
    }));

    // Render com dados de projetos (sem tarefas ainda)
    renderDashboard(false);
    setProgress(40, 'Carregando tarefas dos projetos ativos…');

    // 2. Tarefas — usar cache se disponível (evita 300 chamadas à API a cada carga)
    const active = PROJS_ENRICHED.filter(p => p.status==='em_andamento');
    const total  = active.length;
    let loaded   = 0;

    function applyTasks(p, tasks) {
      if(tasks && tasks.length > 0) {
        TASKS_LOADED[p.id] = tasks;
        const cod = getCurrentPhase(tasks);
        p.currentPhaseCod = cod;
        p.currentPhaseUID = mapPhase(cod);
        p.progData  = calcProgress(tasks);
        p.progPct   = p.progData.pct;
      }
      p.tasksLoaded = true;
      // Sem estimativa por tempo — a fase vem APENAS das tarefas reais
      if(p.dtI) p.meta = metaSt(p.dtI, p.currentPhaseUID, p.durTotal);
    }

    if(cached) {
      // ── MODO CACHE: instantâneo (aplica o resumo leve salvo) ─────────────
      setProgress(60, `Cache local (${cached.age} min atrás) — carregando…`);
      active.forEach(p => {
        const r = cached.resumo[p.id];
        if(r) {
          p.currentPhaseUID = r.fase;
          p.currentPhaseCod = r.cod;
          p.progPct  = r.pct;
          p.progData = { doneAll: r.done, totalAll: r.tot, byUserPhase: {} };
          p.tasksLoaded = true;
          if(p.dtI) p.meta = metaSt(p.dtI, p.currentPhaseUID, p.durTotal);
        }
      });
      window._fromCache = cached.age;
      const comFase = active.filter(p => p.currentPhaseUID).length;
      setProgress(95, `Cache aplicado — ${comFase}/${active.length} projetos`);

    } else {
      // ── MODO API: busca completa e salva cache ───────────────────────────
      window._fromCache = null;
      const BATCH = 1; // Sequencial — 1 projeto por vez, evita 429
      for(let i=0; i<active.length; i+=BATCH){
        const batch = active.slice(i, i+BATCH);
        await Promise.all(batch.map(async p => {
          try {
            const tasks = await fetchAllTasks(p.id);
            applyTasks(p, tasks);
          } catch(e) {
            console.warn(`[SULTS] Proj ${p.id} incompleto:`, e.message);
            p.loadFailed = true; // será reprocessado na 2a passada
            p.currentPhaseUID = null; // não classifica com dados parciais
            window._loadErrors = (window._loadErrors || 0) + 1;
          }
          loaded++;
          const pctAtual = 40 + Math.round(loaded/total*55);
          setProgress(pctAtual, `Carregando tarefas: ${loaded}/${total} projetos…`);
          // Atualizar contador no header em tempo real
          const updEl = document.getElementById('upd');
          if(updEl) updEl.textContent = `Carregando: ${loaded}/${total} projetos…`;
          if(loaded % 9 === 0) renderDashboard(false);
        }));
        // Pequena pausa entre batches para não sobrecarregar a API
        if(i + BATCH < active.length) {
          await new Promise(r => setTimeout(r, 250));
        }
      }

      // ── 2ª PASSADA: reprocessar projetos que falharam (1 por vez, devagar) ──
      let falhados = active.filter(p => p.loadFailed || !p.currentPhaseUID);
      let rodada = 0;
      while(falhados.length > 0 && rodada < 6) {
        rodada++;
        setProgress(95, `Reprocessando ${falhados.length} projetos (rodada ${rodada})…`);
        const updEl0 = document.getElementById('upd');
        if(updEl0) updEl0.textContent = `Reprocessando ${falhados.length} projetos…`;

        for(const p of falhados) {
          try {
            await new Promise(r => setTimeout(r, 800)); // espera generosa entre cada um
            const tasks = await fetchAllTasks(p.id);
            applyTasks(p, tasks);
            p.loadFailed = false;
          } catch(e) {
            console.warn(`[SULTS] Rodada ${rodada} falhou proj ${p.id}`);
          }
        }
        renderDashboard(false);
        falhados = active.filter(p => p.loadFailed || !p.currentPhaseUID);
      }

      // Só salva cache se ≥70% dos projetos têm fase identificada
      const comFase2 = active.filter(p => p.currentPhaseUID).length;
      const pctCarregado = total > 0 ? Math.round(comFase2 / total * 100) : 0;
      if(pctCarregado >= 70) {
        cacheSave(PROJS_ENRICHED);
        console.log(`Cache salvo: ${pctCarregado}% dos projetos com tarefas`);
      } else {
        console.warn(`Cache NÃO salvo: apenas ${pctCarregado}% carregados`);
      }
    }

    setProgress(100, 'Concluído!');
    renderDashboard(true);
    const totalCarregados = PROJS_ENRICHED.filter(p=>p.tasksLoaded).length;
    const totalAtivos2 = PROJS_ENRICHED.filter(p=>p.status==='em_andamento').length;
    const cacheInfo = window._fromCache !== null && window._fromCache !== undefined
      ? ` · 📦 cache (${window._fromCache}min)` : ` · ⚡ via proxy seguro`;
    document.getElementById('upd').textContent = FMTL.format(new Date()) + cacheInfo;

  } catch(err) {
    console.error('Dashboard error:', err);
    const main2 = document.getElementById('main');
    if(main2) main2.innerHTML = `
      <div class="error-wrap">
        <h3>Erro ao carregar dados</h3>
        <p>Não foi possível buscar os dados via proxy. Verifique se o arquivo <code>api/sults.js</code> foi publicado e se a variável <code>SULTS_API_KEY</code> está configurada na Vercel.<br><br><strong>Detalhes:</strong><br>
        <code style="font-size:11px;word-break:break-all">${err.stack || err.message}</code></p>
        <button onclick="init()" style="margin-top:14px;padding:6px 16px;background:#009688;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px">↻ Tentar novamente</button>
      </div>`;
  }
  btn.disabled = false;
}

  document.getElementById('main').innerHTML = `

  </div>
  <div class="sec">
    <div class="sec-lbl">📍 Projetos em andamento por fase <small>· ${full?'tarefas reais':'estimativa por tempo — carregando tarefas...'}</small></div>
    <div class="funnel" id="funnel" style="display:grid;grid-template-columns:repeat(5,1fr);position:relative"></div>
    <div id="funnel-expand" class="ph-expand"></div>
  </div>
  <div class="sec">
    <div class="sec-lbl">🗓 Previsão de inaugurações <small>· mai–dez 2026 · ordenado por data planejada</small></div>
    <div class="timeline-wrap"><div class="timeline-grid" id="timeline-grid"></div></div>
  </div>
  <div class="sec">
    <div class="sec-lbl">👤 Analistas — desempenho contra a meta</div>
    <div class="a-grid" id="agrid"></div>
  </div>
  <div class="sec">
    <div class="sec-lbl">📋 Classificação pela meta</div>
    <div class="tab-bar" id="tab-bar"></div>
    <div class="tbl-card"><div class="tbl-wrap">
      <table><thead><tr>
        <th>Projeto</th><th>Analista</th><th>Fase atual</th>
        <th>Início</th><th>Duração atual</th><th>Previsão término</th><th>Tempo total previsto</th>
        ${full?'<th>Progresso real</th>':''}
        <th>Progresso meta</th><th>Classificação</th>
      </tr></thead><tbody id="tbody"></tbody></table>
    </div></div>
  </div>`;

  // KPIs
  document.getElementById('kpis').innerHTML=[
    {l:'Meta',v:'8 meses',s:'243 dias por unidade',c:'',hero:true},
    {l:'Total projetos',v:all.length,s:`${ativos.length} em andamento · ${concs.length} concluídos`,c:'var(--txt)'},
    {l:'Estourou a meta',v:est,s:'projetos ativos acima de 8m',c:'#DC2626'},
    {l:'Em risco',v:rsc,s:'entre 6,7 e 8 meses',c:'#EA580C'},
    {l:'No prazo',v:ok,s:'abaixo de 6,7 meses',c:'#16A34A'},
    {l:'Em andamento',v:ativos.length,s:'projetos ativos monitorados',c:'#2563EB'},
  ].map(k=>`<div class="kpi${k.hero?' hero':''}">
    <div class="kpi-label">${k.l}</div>
    <div class="kpi-value"${k.c?` style="color:${k.c}"`:''}>${k.v}</div>
    <div class="kpi-sub">${k.s}</div>
  </div>`).join('');

  // Funnel — salva phMap globalmente para o click handler
  window._phMap = phMap;

  const aguardando = phMap[0] || [];
  const aguardandoCol = aguardando.length > 0 ? `
    <div class="ph-col" style="border-top:3px solid #9E9E9E;opacity:0.7">
      <div class="ph-name"><span style="width:8px;height:8px;border-radius:50%;background:#9E9E9E;display:inline-block;flex-shrink:0"></span><span style="color:#6B6A66">Carregando fase…</span></div>
      <div class="ph-range">tarefas pendentes</div>
      <div class="ph-tasks">Aguardando dados da API</div>
      <div class="ph-count" style="color:#9E9E9E">${aguardando.length}</div>
      <div class="ph-sub"><span class="badge b-pau">${aguardando.length} projeto${aguardando.length>1?'s':''}</span></div>
      <div class="ph-items">
        ${aguardando.slice(0,4).map(p=>`<div class="ph-item" style="background:#F1EFE8;color:#6B6A66">${p.nome.replace('Fast Tennis - ','FT ').replace('Fast Tennis ','FT ')}</div>`).join('')}
        ${aguardando.length>4?`<div class="ph-more">+${aguardando.length-4} projetos</div>`:''}
      </div>
    </div>` : '';

  // Ajustar grid para 6 colunas se tiver coluna de aguardando
  const funnelEl = document.getElementById('funnel');
  if(funnelEl) {
    funnelEl.style.gridTemplateColumns = aguardando.length > 0
      ? 'repeat(6,minmax(130px,1fr))'
      : 'repeat(5,minmax(140px,1fr))';
  }

  document.getElementById('funnel').innerHTML=USER_PHASES.map(ph=>{
    const items=phMap[ph.id]||[];
    return`<div class="ph-col" style="border-top:3px solid ${ph.c}" onclick="togglePhase(${ph.id})" data-ph="${ph.id}">
      <div class="ph-name"><span style="width:8px;height:8px;border-radius:50%;background:${ph.c};display:inline-block;flex-shrink:0"></span><span style="color:${ph.c}">${ph.l}</span></div>
      <div class="ph-range">${ph.s}</div>
      <div class="ph-tasks">${ph.tasks}</div>
      <div class="ph-count" style="color:${ph.c}">${items.length}</div>
      <div class="ph-sub">
        ${items.length?`<span class="badge b-blu">${items.length} em andamento</span>`:''}
      </div>
      <div class="ph-items">
        ${items.slice(0,5).map(p=>`<div class="ph-item" title="${p.nome} · ${fn(p.resp)}" style="background:${ph.bg};color:${ph.c}">${p.nome.replace('Fast Tennis - ','FT ').replace('Fast Tennis ','FT ')}</div>`).join('')}
        ${items.length>5?`<div class="ph-more">+${items.length-5} projetos</div>`:''}
      </div>
    </div>`;
  }).join('') + aguardandoCol;

  // Tab bar
  document.getElementById('tab-bar').innerHTML=[
    {k:'todos',l:'Todos ativos'},
    {k:'est',l:'🔴 Estourou'},
    {k:'risco',l:'🟠 Em risco'},
    {k:'ok',l:'🟢 No prazo'},
    {k:'atv',l:'Em andamento'},
  ].map((t,i)=>`<button class="tab${i===0?' active':''}" onclick="setTab('${t.k}',this)">${t.l}<span class="tab-count">${TABS[t.k].length}</span></button>`).join('');

  window._TABS = TABS;
  window._FULL = full;
  renderTable('todos');

  // ── Timeline de inaugurações ───────────────────────────────────────────────
  const MONTHS = [
    {key:'2026-05', label:'Maio',     short:'Mai/26'},
    {key:'2026-06', label:'Junho',    short:'Jun/26'},
    {key:'2026-07', label:'Julho',    short:'Jul/26'},
    {key:'2026-08', label:'Agosto',   short:'Ago/26'},
    {key:'2026-09', label:'Setembro', short:'Set/26'},
    {key:'2026-10', label:'Outubro',  short:'Out/26'},
    {key:'2026-11', label:'Novembro', short:'Nov/26'},
    {key:'2026-12', label:'Dezembro', short:'Dez/26'},
  ];
  const todayKey = TS.slice(0,7); // '2026-05'

  // Cores por analista
  const ANALYST_COLORS = {
    'Eduarda Charles Melo':                 {bg:'#DBEAFE',tc:'#1D4ED8'},
    'André Dias Rabello':                   {bg:'#D1FAE5',tc:'#065F46'},
    'Natalia Cristiane Amorim de Oliveira': {bg:'#FEF3C7',tc:'#92400E'},
    'Juliana Oliveira':                     {bg:'#FCE7F3',tc:'#9D174D'},
  };

  // Agrupar projetos em andamento por mês do dtF
  const byMonth = {};
  MONTHS.forEach(m => { byMonth[m.key] = [] });

  ativos.forEach(p => {
    if(!p.dtF) return;
    const mk = p.dtF.slice(0,7);
    if(byMonth[mk]) {
      byMonth[mk].push(p);
    }
  });

  const tlEl = document.getElementById('timeline-grid');
  if(tlEl) {
    tlEl.innerHTML = MONTHS.map(m => {
      const isPast   = m.key < todayKey;
      const isCurrent= m.key === todayKey;
      const items    = (byMonth[m.key]||[]).sort((a,b)=>a.dtF.localeCompare(b.dtF));
      const cls      = isCurrent ? 'tl-month current' : isPast ? 'tl-month tl-month-past' : 'tl-month';

      const units = items.map(p => {
        const ac = ANALYST_COLORS[p.resp] || {bg:'#F1EFE8',tc:'#444441'};
        const nomeUnidade = p.unidade && p.unidade!=='—' ? p.unidade : p.nome.replace('Fast Tennis - ','').replace('Fast Tennis ','');
        const dia = p.dtF ? p.dtF.slice(8,10) : '';
        return `<div class="tl-unit" style="background:${ac.bg};color:${ac.tc}" title="${p.nome}
Analista: ${fn(p.resp)}
Previsão: ${fmt(p.dtF)}">
          <div class="tl-unit-name">${nomeUnidade}</div>
          <div class="tl-unit-resp">${fn(p.resp)} · ${dia ? dia+'/'+m.key.slice(5,7) : '—'}</div>
        </div>`;
      }).join('');

      return `<div class="${cls}">
        <div class="tl-month-hd">
          <div class="tl-month-name">${isCurrent ? '📍 ' : ''}${m.short}</div>
          <div class="tl-month-count">${items.length ? items.length+' unidade'+( items.length>1?'s':'') : 'nenhuma prevista'}</div>
        </div>
        <div class="tl-month-body">
          ${units || '<div class="tl-empty">–</div>'}
        </div>
      </div>`;
    }).join('');
  }

  // Analyst grid
  document.getElementById('agrid').innerHTML=ANALYSTS.map(({n})=>{
    const a=aMap[n]; if(!a||a.tot===0) return '';
    const pOk=Math.round(a.ok/a.tot*100);
    const bc=pOk>=60?'#16A34A':pOk>=40?'#D97706':'#DC2626';
    return`<div class="a-card">
      <div class="a-hd">
        <div class="av" style="background:${a.av};color:${a.tc}">${ini(n)}</div>
        <div><div class="a-name">${fn(n)}</div><div class="a-sub">${a.tot} projetos ativos</div></div>
      </div>
      <div class="a-stats">
        <div><div class="sv" style="color:#DC2626">${a.est}</div><div class="sl">estourou</div></div>
        <div><div class="sv" style="color:#EA580C">${a.rsc}</div><div class="sl">risco</div></div>
        <div><div class="sv" style="color:#16A34A">${a.ok}</div><div class="sl">no prazo</div></div>
      </div>
      <div class="a-bar-wrap"><div class="a-bar" style="width:${pOk}%;background:${bc}"></div></div>
      <div class="a-bar-lbl"><span>no prazo da meta</span><span style="font-weight:700;color:${bc}">${pOk}%</span></div>
    </div>`;
  }).join('');
}

window.setTab = function(k, btn){
  if(!document.getElementById('tbody')) return;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTable(k);
};

function renderTable(key){
  const tbody = document.getElementById('tbody');
  if(!tbody) return;
  const rows = window._TABS?.[key] || [];
  const full = window._FULL;
  tbody.innerHTML = rows.map(p => {
    const pct = Math.min(Math.round(p.dur/META*100),200);
    const bc  = barColor(pct);
    const phLabel = p.currentPhaseUID
      ? `<span class="badge" style="background:${USER_PHASES[p.currentPhaseUID-1].bg};color:${USER_PHASES[p.currentPhaseUID-1].c}">${USER_PHASES[p.currentPhaseUID-1].l}</span>`
      : '<span class="badge" style="background:#F1EFE8;color:#9E9E9E">⟳ carregando…</span>';
    const progReal = full && p.tasksLoaded && p.progPct!==null
      ? `<td class="td-mono">${p.progPct}% <span style="color:var(--t3);font-size:10px">(${p.progData?.doneAll||0}/${p.progData?.totalAll||0})</span></td>`
      : full ? `<td style="color:var(--t3);font-size:11px">—</td>` : '';
    return `<tr>
      <td class="td-name" style="max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${p.nome}">${p.nome}</td>
      <td class="td-m">${fn(p.resp)}</td>
      <td>${phLabel}</td>
      <td class="td-m td-mono">${fmt(p.dtI)}</td>
      <td class="td-mono" style="font-weight:600">${mStr(p.dur)} <span style="color:var(--t3);font-weight:400">(${p.dur}d)</span></td>
      <td class="td-m td-mono">${p.dtF?fmt(p.dtF):'—'}</td>
      <td class="td-mono" style="font-weight:600">${p.durTotal!=null?mStr(p.durTotal)+' <span style=\'color:var(--t3);font-weight:400\'>('+p.durTotal+'d)</span>':'<span style=\'color:var(--t3)\'>—</span>'}</td>
      ${progReal}
      <td style="min-width:130px">
        <div class="prog-wrap">
          <div class="prog-track"><div class="prog-fill" style="width:${Math.min(pct,100)}%;background:${bc}"></div></div>
          <span class="prog-lbl" style="color:${bc}">${pct}%</span>
        </div>
      </td>
      <td><span class="badge ${p.meta.cls}">${p.meta.l}</span></td>
    </tr>`;
  }).join('');
}


// ── FUNNEL EXPAND ────────────────────────────────────────────────────────────
let _activePhase = null;

window.togglePhase = function(phId) {
  const expand  = document.getElementById('funnel-expand');
  const cols    = document.querySelectorAll('.ph-col');
  const ph      = USER_PHASES.find(p=>p.id===phId);
  const items   = (window._phMap||{})[phId] || [];

  // Toggle off if same phase clicked again
  if(_activePhase === phId) {
    _activePhase = null;
    expand.classList.remove('open');
    cols.forEach(c=>c.classList.remove('active'));
    return;
  }

  _activePhase = phId;
  cols.forEach(c=>c.classList.toggle('active', parseInt(c.dataset.ph)===phId));

  const rows = [...items].sort((a,b)=>b.dur-a.dur).map(p=>{
    const refDur  = (p.durTotal != null && p.durTotal > 0) ? p.durTotal : p.dur;
    const desvio  = refDur - META;
    const desvioM = Math.abs(desvio/30.4).toFixed(1);
    const desvioLabel = desvio > 0
      ? `<span class="desvio-pos">+${desvioM}m (+${desvio}d)</span>`
      : desvio < 0
        ? `<span class="desvio-neg">${desvioM}m antes</span>`
        : `<span class="desvio-ok">Na meta</span>`;

    const progReal = p.progPct !== null && p.progPct !== undefined
      ? `${p.progPct}% <span style="color:var(--t3);font-size:10px">(${p.progData?.doneAll||0}/${p.progData?.totalAll||0})</span>`
      : `<span style="color:var(--t3)">carregando…</span>`;

    const metaClass = p.dur>META?'b-red':p.dur>META*.82?'b-ora':'b-grn';
    const pct = Math.min(Math.round(p.dur/META*100),200);
    const bc  = pct>100?'#DC2626':pct>82?'#EA580C':pct>60?'#D97706':'#16A34A';

    return `<tr>
      <td style="font-weight:500;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${p.nome}">${p.nome}</td>
      <td style="color:var(--t2)">${fn(p.resp)}</td>
      <td style="font-family:'DM Mono',monospace;font-size:11px;font-weight:600">${mStr(p.dur)} <span style="color:var(--t3);font-weight:400">(${p.dur}d)</span></td>
      <td>${progReal}</td>
      <td>${desvioLabel}</td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <div style="flex:1;height:5px;background:var(--bg);border-radius:3px;overflow:hidden;min-width:60px">
            <div style="height:5px;border-radius:3px;width:${Math.min(pct,100)}%;background:${bc}"></div>
          </div>
          <span style="font-size:10px;font-weight:600;color:${bc};min-width:32px;text-align:right">${pct}%</span>
        </div>
      </td>
      <td><span class="badge ${metaClass}">${p.meta.l}</span></td>
    </tr>`;
  }).join('');

  expand.innerHTML = `<div class="ph-expand-inner">
    <div class="ph-expand-title">
      <span style="color:${ph.c}">● ${ph.l} — ${items.length} projeto${items.length!==1?'s':''}</span>
      <span class="ph-expand-close" onclick="togglePhase(${phId})">✕</span>
    </div>
    <table class="exp-table">
      <thead><tr>
        <th>Projeto</th>
        <th>Analista</th>
        <th>Duração</th>
        <th>Progresso real</th>
        <th>Desvio da meta</th>
        <th>% da meta</th>
        <th>Classificação</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
  expand.classList.add('open');

  // Scroll suave até o painel expandido
  setTimeout(()=>expand.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
};


// ── DIAGNÓSTICO DA API ────────────────────────────────────────────────────────
window.diagAPI = async function() {
  const btn = document.getElementById('btn-diag');
  btn.textContent = '⏳ Testando...';
  btn.disabled = true;

  // Remove painel anterior se existir
  const old = document.getElementById('diag-panel');
  if(old) old.remove();

  const panel = document.createElement('div');
  panel.id = 'diag-panel';
  panel.style.cssText = 'position:fixed;top:60px;right:20px;width:480px;max-height:500px;overflow-y:auto;background:var(--sur);border:1px solid var(--brdm);border-radius:10px;padding:16px;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.15);font-size:12px;font-family:monospace';
  panel.innerHTML = '<div style="display:flex;justify-content:space-between;margin-bottom:12px"><strong style="font-size:13px">Diagnóstico da API</strong><span onclick="document.getElementById(\'diag-panel\').remove()" style="cursor:pointer;color:var(--t2)">✕</span></div><div id="diag-log">Iniciando testes...</div>';
  document.body.appendChild(panel);

  const log = (msg, color='var(--txt)') => {
    const el = document.getElementById('diag-log');
    if(el) el.innerHTML += `<div style="color:${color};margin:3px 0;border-bottom:.5px solid var(--brd);padding-bottom:3px">${msg}</div>`;
  };

  try {
    // Teste 1: buscar projetos
    log('1. Testando endpoint de projetos...', 'var(--t2)');
    const p1 = await apiFetch('/implantacao/projeto?start=0&limit=3');
    log(`✅ Projetos: ${p1.data?.length} retornados de ${p1.size} total`, '#16A34A');

    if(!p1.data?.length) { log('❌ Nenhum projeto retornado', '#DC2626'); btn.textContent='🔍 Diagnosticar API'; btn.disabled=false; return; }

    const proj = p1.data[0];
    log(`   Projeto teste: <strong>${proj.nome}</strong> (id: ${proj.id})`, 'var(--t2)');

    // Teste 2: buscar tarefas do primeiro projeto
    log('2. Testando endpoint de tarefas...', 'var(--t2)');
    const t1 = await apiFetch(`/implantacao/projeto/${proj.id}/tarefa?start=0&limit=5`);
    log(`✅ Tarefas: ${t1.data?.length} retornadas (total: ${t1.size}, páginas: ${t1.totalPage})`, '#16A34A');

    if(!t1.data?.length) { log('⚠️ Nenhuma tarefa retornada para este projeto', '#D97706'); }
    else {
      const t = t1.data[0];
      log(`   1ª tarefa: <strong>${t.nome}</strong>`, 'var(--t2)');
      log(`   → fase: ${JSON.stringify(t.fase)}`, t.fase ? '#16A34A' : '#DC2626');
      log(`   → situacao: ${t.situacao} (1=Concluído, 2=Aberto, 3=Andamento)`, t.situacao ? '#16A34A' : '#DC2626');
      log(`   → codigo: ${t.codigo}`, 'var(--t2)');

      // Verificar se fase está presente
      if(!t.fase) log('❌ PROBLEMA: campo "fase" está NULO nas tarefas — a classificação por fase não funcionará', '#DC2626');
      else if(!t.fase.codigo) log('❌ PROBLEMA: fase.codigo está vazio', '#DC2626');
      else log(`✅ fase.codigo OK: "${t.fase.codigo}" → fase ${mapPhase(t.fase.codigo)}`, '#16A34A');
    }

    // Teste 3: verificar todas as tarefas do projeto
    log('3. Descobrindo limite máximo da API...', 'var(--t2)');
    let limiteOk = 0;
    for(const lim of [50,30,20,10,5]) {
      try {
        await apiFetch(`/implantacao/projeto/${proj.id}/tarefa?start=0&limit=${lim}`);
        limiteOk = lim;
        log(`✅ limit=${lim} FUNCIONA — usando este valor`, '#16A34A');
        break;
      } catch(e) {
        log(`✗ limit=${lim} rejeitado (${e.message})`, '#D97706');
      }
    }
    const allT = await apiFetch(`/implantacao/projeto/${proj.id}/tarefa?start=0&limit=${limiteOk||5}`);
    const comFase = (allT.data||[]).filter(t => t.fase?.codigo).length;
    const comSit  = (allT.data||[]).filter(t => t.situacao).length;
    const concluidas = (allT.data||[]).filter(t => t.situacao === 1).length;
    log(`   ${allT.data?.length} tarefas buscadas`, 'var(--t2)');
    log(`   ${comFase}/${allT.data?.length} com fase.codigo preenchido`, comFase > 0 ? '#16A34A' : '#DC2626');
    log(`   ${comSit}/${allT.data?.length} com situacao preenchida`, comSit > 0 ? '#16A34A' : '#DC2626');
    log(`   ${concluidas} concluídas (situacao=1)`, 'var(--t2)');

    const faseAtual = getCurrentPhase(allT.data||[]);
    log(`   Fase atual detectada: ${faseAtual} → usuário: ${mapPhase(faseAtual)}`, faseAtual ? '#16A34A' : '#DC2626');

    log('✅ Diagnóstico concluído', '#16A34A');

  } catch(e) {
    log(`❌ ERRO: ${e.message}`, '#DC2626');
    log('Verifique o console do navegador (F12) para mais detalhes', '#D97706');
  }

  btn.textContent = '🔍 Diagnosticar API';
  btn.disabled = false;
};

// Start
init();
</script>
